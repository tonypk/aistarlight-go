name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.26"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: aistarlight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/aistarlight_test?sslmode=disable
          REDIS_URL: redis://localhost:6379/0
        run: go test -race -coverprofile=coverage.out ./...
      - name: Check coverage
        run: go tool cover -func=coverage.out

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Cross-compile binaries
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o aistarlight-api ./cmd/api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o aistarlight-worker ./cmd/worker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o aistarlight-bot ./cmd/bot
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o aistarlight-migrate ./cmd/migrate
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            aistarlight-api
            aistarlight-worker
            aistarlight-bot
            aistarlight-migrate
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Make binaries executable
        run: chmod +x aistarlight-api aistarlight-worker aistarlight-bot aistarlight-migrate

      - name: Upload files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "aistarlight-api,aistarlight-worker,aistarlight-bot,aistarlight-migrate,migrations,docker,deploy,docker-compose.prod.yml"
          target: "/tmp/aistarlight-deploy"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail
            PROJECT_DIR=/home/anna/aistarlight-go
            DEPLOY_DIR=/tmp/aistarlight-deploy
            COMPOSE="sudo docker compose --project-directory $PROJECT_DIR -p aistarlight-go -f $PROJECT_DIR/docker-compose.prod.yml"

            # Copy binaries and config
            sudo cp $DEPLOY_DIR/aistarlight-{api,worker,bot,migrate} "$PROJECT_DIR/"
            sudo chmod +x "$PROJECT_DIR"/aistarlight-{api,worker,bot,migrate}
            sudo cp -r $DEPLOY_DIR/migrations "$PROJECT_DIR/"
            sudo cp -r $DEPLOY_DIR/docker "$PROJECT_DIR/"
            sudo cp -r $DEPLOY_DIR/deploy "$PROJECT_DIR/"
            sudo cp $DEPLOY_DIR/docker-compose.prod.yml "$PROJECT_DIR/"
            sudo chown -R anna:anna "$PROJECT_DIR"

            # Start database first, wait for it to be ready
            $COMPOSE up -d --remove-orphans postgres redis
            echo "Waiting for postgres to be healthy..."
            for i in $(seq 1 30); do
                if $COMPOSE exec -T postgres pg_isready -U aistarlight > /dev/null 2>&1; then
                    echo "Postgres ready!"
                    break
                fi
                sleep 2
            done

            # Run migrations with retry (Docker DNS can be slow)
            for attempt in 1 2 3; do
                if $COMPOSE run --rm migrate; then
                    echo "Migrations completed!"
                    break
                fi
                echo "Migration attempt $attempt failed, retrying in 5s..."
                sleep 5
            done

            # Build and restart application services
            $COMPOSE build api worker bot
            $COMPOSE up -d --remove-orphans api worker bot nginx

            # Reload nginx to pick up new container IPs
            $COMPOSE exec -T nginx nginx -s reload 2>/dev/null || true

            # Health check
            echo "Waiting for API health..."
            for i in $(seq 1 30); do
                if curl -sf http://localhost/health > /dev/null 2>&1; then
                    echo "API healthy!"
                    break
                fi
                if [ "$i" -eq 30 ]; then
                    echo "ERROR: Health check failed"
                    $COMPOSE logs api --tail=20
                    exit 1
                fi
                sleep 2
            done

            # Cleanup
            sudo docker image prune -f
            rm -rf $DEPLOY_DIR
