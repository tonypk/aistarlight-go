name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/tonypk25/aistarlight-go

            # Pull latest backend code
            git stash 2>/dev/null || true
            git pull origin main

            # Run migrations
            sudo docker compose -f docker-compose.prod.yml run --rm migrate 2>/dev/null || true

            # Rebuild and restart services
            sudo docker compose -f docker-compose.prod.yml up -d --build api worker bot

            # Restart nginx to pick up new container IPs
            sudo docker compose -f docker-compose.prod.yml restart nginx

            echo "Backend deploy complete: $(date)"
